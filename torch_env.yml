# name: auth-torch
channels:
  - https://repo.anaconda.com/pkgs/main
  - https://repo.anaconda.com/pkgs/r
  - conda-forge
dependencies:
  - python==3.12 # 3.13 not compatible with pymc
  - jupyter
  - ipykernel
  - scikit-learn
  - scipy
  - pandas
  - matplotlib
  - imageio
  - timm
  
  - pip==25.2 # this version requested by pymc
  - pip:
    - torch
    - torchvision
    - torchaudio
    - transformers
